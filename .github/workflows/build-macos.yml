name: build-macos

# Builds Chessboard.app (arm64, adhoc-signed) on a macOS runner: Native SDK comes
# from npm (@native-sdk/cli), zig from ziglang.org. Optionally uploads the
# zip to an existing release when release_tag is set.
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to upload the zip to (optional)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: unit tests
        run: node scripts/test-chess.mjs
      - name: install Native SDK CLI
        run: |
          npm install -g @native-sdk/cli
          native --version || true
          echo "SDK_PATH=$(npm root -g)/@native-sdk/cli" >> "$GITHUB_ENV"
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: sync frontend dist
        run: |
          rm -rf frontend/dist && mkdir -p frontend/dist/js
          cp src/web/index.html src/web/styles.css frontend/dist/
          cp src/web/js/*.js frontend/dist/js/
      - name: zig build
        run: zig build -Doptimize=ReleaseFast -Dnative-sdk-path="$SDK_PATH"
      - name: package .app + zip
        run: |
          mkdir -p dist
          native package --target macos --signing adhoc --output dist/Chessboard.app --binary zig-out/bin/chessboard
          ditto -c -k --sequesterRsrc --keepParent dist/Chessboard.app dist/Chessboard-macOS-arm64.zip
          ls -lh dist
      - uses: actions/upload-artifact@v4
        with:
          name: Chessboard-macOS-arm64
          path: dist/Chessboard-macOS-arm64.zip
      - name: upload to release
        if: ${{ inputs.release_tag != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.release_tag }}
        run: gh release upload "$TAG" dist/Chessboard-macOS-arm64.zip --clobber
