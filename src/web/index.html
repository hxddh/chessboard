<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>国际象棋</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div id="app">
    <header class="chrome">
      <span class="brand"><svg class="brand-mark" viewBox="0 0 100 100" aria-hidden="true"><path fill="currentColor" d="M 36 78 L 72 78 C 72 70 71 63 68 55 C 74 48 76 40 74 32 C 73 26.5 70 21.5 64 18.6 L 66.2 10.2 C 66.6 8.2 64.2 7.2 62.9 8.8 L 56.8 15.2 C 55.4 14.8 54 15.2 53.6 16.6 L 52.5 20 C 46 22 40 26.5 35.5 32.5 C 30.5 39 27.5 47 27 54 C 26.8 56.5 28 58.5 30.3 59.3 L 38 62 C 40.5 62.8 43 62 44.6 60 L 49 54.5 C 50 53.3 51.7 53.6 52.3 55 C 52.8 56.2 52.4 57.4 51.4 58.4 L 43 66.5 C 39 70.3 36.5 73.5 36 78 Z"/></svg>国际象棋</span>
      <span class="status-pill" id="status">白方走子</span>
      <span class="meta-chip num" id="moves">0/0</span>
      <span class="spacer"></span>
      <div class="chrome-actions">
        <button type="button" class="tool-btn" id="btn-hint" title="引擎提示 (H)">提示</button>
        <button type="button" class="tool-btn" id="undo" disabled title="悔棋 (Z)">悔棋</button>
        <button type="button" class="tool-btn" id="btn-flip" title="翻转棋盘 (F)">翻转</button>
        <button type="button" class="tool-btn primary" id="btn-new" title="新局 (N)">新局</button>
        <button type="button" class="icon-btn" id="toggle-panel" title="侧栏 (Tab)" aria-label="侧栏">☰</button>
      </div>
    </header>

    <div class="scrim" id="scrim"></div>
    <div class="stage">
      <div id="board-wrap">
        <canvas id="board" width="900" height="900" aria-label="棋盘"></canvas>
      </div>
    </div>

    <aside class="side" id="side" aria-label="对局面板">
      <section class="side-head">
        <div class="vs">
          <div class="vs-side">
            <span class="pmark white" aria-hidden="true">♔</span>
            <div>
              <div class="vs-name">
                白
                <span class="badge" id="white-turn" hidden>行</span>
              </div>
              <div class="vs-role muted" id="white-role">玩家 1</div>
              <div class="vs-clock num" id="clock-w" hidden>5:00</div>
            </div>
          </div>
          <div class="vs-mid muted">对</div>
          <div class="vs-side vs-right">
            <div>
              <div class="vs-name">
                <span class="badge" id="black-turn" hidden>行</span>
                黑
              </div>
              <div class="vs-role muted" id="black-role">玩家 2</div>
              <div class="vs-clock num" id="clock-b" hidden>5:00</div>
            </div>
            <span class="pmark black" aria-hidden="true">♚</span>
          </div>
        </div>
        <div class="opening-line" id="opening-line" hidden></div>
      </section>

      <section class="side-section">
        <h2 class="side-h">对局</h2>
        <div class="setting-list">
          <div class="setting-row stack">
            <span class="setting-k">模式</span>
            <div class="theme-row" id="mode-seg" role="group" aria-label="模式">
              <button type="button" data-mode="ai" class="active" title="与 Stockfish 引擎对弈">人机</button>
              <button type="button" data-mode="pvp" title="双人同屏对弈">双人</button>
              <button type="button" data-mode="learn" title="从零学国际象棋:互动课程">教学</button>
              <button type="button" data-mode="puzzle" title="战术做题:一步杀 / 两步杀">做题</button>
            </div>
          </div>
          <div class="setting-row stack" id="row-difficulty">
            <span class="setting-k">难度</span>
            <div class="theme-row" id="diff-seg" role="group" aria-label="难度">
              <button type="button" data-diff="easy" title="Elo 1320">入门</button>
              <button type="button" data-diff="normal" class="active" title="Elo 1700">进阶</button>
              <button type="button" data-diff="hard" title="Elo 2200">困难</button>
              <button type="button" data-diff="extreme" title="Stockfish 满强度">极限</button>
            </div>
          </div>
          <div class="setting-row stack" id="row-color">
            <span class="setting-k">执子</span>
            <div class="theme-row" id="color-seg" role="group" aria-label="执子">
              <button type="button" data-color="w" class="active" title="执白先行">执白</button>
              <button type="button" data-color="b" title="执黑后行">执黑</button>
            </div>
          </div>
          <div class="setting-row stack" id="row-clock" hidden>
            <span class="setting-k">棋钟</span>
            <div class="theme-row" id="clock-seg" role="group" aria-label="棋钟">
              <button type="button" data-tc="off" class="active" title="不限时">关</button>
              <button type="button" data-tc="3" title="每方 3 分钟">3分</button>
              <button type="button" data-tc="5" title="每方 5 分钟">5分</button>
              <button type="button" data-tc="10" title="每方 10 分钟">10分</button>
            </div>
          </div>
        </div>
      </section>

      <section class="side-section">
        <h2 class="side-h">外观</h2>
        <div class="setting-list">
          <div class="setting-row stack">
            <span class="setting-k">主题</span>
            <div class="theme-row" id="theme-seg" role="group" aria-label="主题">
              <button type="button" data-theme="wood" class="active" title="木色">木</button>
              <button type="button" data-theme="night" title="夜色">夜</button>
              <button type="button" data-theme="day" title="日间">日</button>
              <button type="button" data-theme="notebook" title="纸本">纸</button>
            </div>
          </div>
          <div class="setting-row">
            <span class="setting-k">音效</span>
            <button type="button" class="switch" id="opt-sound" aria-pressed="true" title="走子音效">
              <span class="switch-knob"></span>
            </button>
          </div>
        </div>
      </section>

      <section class="side-section" id="sec-learn" hidden>
        <div class="side-h-row">
          <h2 class="side-h">教学</h2>
          <span class="side-h-meta num" id="learn-progress">0/0</span>
          <button type="button" class="text-link danger" id="learn-reset" title="清空教学进度,从第一课重新开始">重置</button>
        </div>
        <div class="lesson-title" id="lesson-title"></div>
        <div class="lesson-text" id="lesson-text"></div>
        <div class="lesson-task" id="lesson-task"></div>
        <div class="lesson-controls">
          <button type="button" class="tool-btn" id="lesson-restart" title="重做本课任务 (R)">重来</button>
          <button type="button" class="tool-btn" id="lesson-next" title="进入下一课">下一课</button>
        </div>
        <div class="lesson-list" id="lesson-list" aria-label="课程列表"></div>
      </section>

      <section class="side-section" id="sec-puzzle" hidden>
        <div class="side-h-row">
          <h2 class="side-h">做题</h2>
          <span class="side-h-meta num" id="puzzle-progress">已解 0/0</span>
        </div>
        <div class="setting-row stack">
          <span class="setting-k">题型</span>
          <div class="theme-row wrap" id="puzzle-cat-seg" role="group" aria-label="题型">
            <button type="button" data-cat="m1" class="active" title="一步将死">一步杀</button>
            <button type="button" data-cat="m2" title="两步将死(含引子与静着)">两步杀</button>
            <button type="button" data-cat="m3" title="三步将死(双车赶王)">三步杀</button>
            <button type="button" data-cat="win" title="吃子战术:选出净得子力最多的一吃">吃子</button>
            <button type="button" data-cat="tac" title="战术母题:串击、闪将 —— 强制得子">战术</button>
            <button type="button" data-cat="op" title="开局练习:执白照谱走主流开局">开局</button>
            <button type="button" data-cat="review" title="复习:重做答错或看过答案的题,做对即移出">复习</button>
          </div>
        </div>
        <div class="lesson-task" id="puzzle-task"></div>
        <div class="lesson-controls">
          <button type="button" class="tool-btn" id="puzzle-retry" title="重新开始本题 (R)">重做</button>
          <button type="button" class="tool-btn" id="puzzle-answer" title="标出当前一步的正解 (H)">答案</button>
          <button type="button" class="tool-btn" id="puzzle-next" title="下一道未解的题 (N)">下一题</button>
        </div>
        <div class="lesson-list" id="puzzle-list" aria-label="题目列表"></div>
      </section>

      <section class="side-section grow-sec" id="sec-moves">
        <div class="side-h-row">
          <h2 class="side-h">棋谱</h2>
          <span class="side-h-meta num" id="replay-pos">0 / 0</span>
        </div>
        <div class="move-list" id="move-list" aria-label="着法列表"></div>
        <div class="replay-bar" id="replay-seg">
          <button type="button" id="rep-start" title="开局 (Home)">«</button>
          <button type="button" id="rep-prev" title="上一着 (←)">‹</button>
          <button type="button" id="rep-live" disabled title="回到最新">●</button>
          <button type="button" id="rep-next" title="下一着 (→)">›</button>
          <button type="button" id="rep-end" title="终局 (End)">»</button>
        </div>
        <div id="eval-wrap" hidden>
          <canvas id="eval-curve" aria-label="局势曲线" title="点击跳转到对应局面"></canvas>
          <div class="pv-line num" id="pv-line" hidden></div>
        </div>
        <div class="link-row">
          <button type="button" class="text-link" id="an-run" title="引擎满强度评估每一步,标注失着">分析</button>
          <button type="button" class="text-link" id="retry-here" disabled title="回到复盘所在的一着继续下,其后着法丢弃">重下</button>
          <button type="button" class="text-link" id="pgn-copy" title="复制 PGN(含标准对局标签)">PGN</button>
          <button type="button" class="text-link" id="pgn-download">导出</button>
          <button type="button" class="text-link" id="pgn-paste" title="从剪贴板粘贴 PGN">粘贴</button>
          <button type="button" class="text-link" id="fen-copy" title="复制当前局面 FEN">FEN</button>
          <button type="button" class="text-link" id="btn-offerdraw" disabled title="提议和棋(双人:双方确认;人机:引擎按局面判断)">提和</button>
          <button type="button" class="text-link danger" id="btn-resign" disabled title="认输并结束本局">认输</button>
        </div>
        <p class="hint">分析后曲线可点击跳转 · ?! 小失误 · ? 失误 · ?? 严重失误</p>
      </section>

      <section class="side-section" id="sec-stats">
        <div class="side-h-row">
          <h2 class="side-h">统计</h2>
          <button type="button" class="text-link danger" id="stats-clear" disabled>清零</button>
        </div>
        <div class="stats-body" id="stats-body"></div>
        <div class="side-h-row" style="margin-top:14px">
          <h2 class="side-h">成就</h2>
          <span class="side-h-meta num" id="ach-count">0/0</span>
        </div>
        <div class="ach-body" id="ach-body"></div>
      </section>

      <div class="side-foot">
        <button type="button" class="text-link danger" id="clear-save">清除存档</button>
        <button type="button" class="text-link" id="collapse">收起</button>
      </div>
    </aside>

    <div class="toast" id="toast"></div>

    <div class="modal-bg" id="promo-modal" role="dialog" aria-label="升变">
      <div class="modal promo-modal">
        <h3>升变为</h3>
        <div class="promo-row">
          <button type="button" data-p="q" title="升变为后 (Q)"><span class="promo-glyph">♛</span>后</button>
          <button type="button" data-p="r" title="升变为车 (R)"><span class="promo-glyph">♜</span>车</button>
          <button type="button" data-p="b" title="升变为象 (B)"><span class="promo-glyph">♝</span>象</button>
          <button type="button" data-p="n" title="升变为马 (N)"><span class="promo-glyph">♞</span>马</button>
        </div>
      </div>
    </div>

    <div class="modal-bg" id="confirm-modal" role="dialog" aria-label="确认">
      <div class="modal">
        <h3 id="confirm-title">确认</h3>
        <p id="confirm-message" class="muted" style="margin:0 0 16px;font-size:14px;line-height:1.5;color:var(--text)"></p>
        <div class="close-row" style="display:flex;gap:8px;justify-content:flex-end">
          <button type="button" class="tool-btn" id="confirm-cancel">取消</button>
          <button type="button" class="tool-btn primary" id="confirm-ok">确定</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/chess.js"></script>
  <script src="js/openings.js"></script>
  <script src="js/lessons.js"></script>
  <script src="js/puzzles.js"></script>
  <script src="js/achievements.js"></script>
  <script src="js/engine-src.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/host.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/board.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
